{% extends "base.html" %}

{% block title %}{{ poet.name }} - పద్యార్చన{% endblock %}

{% block content %}
<div x-data="poetDetailPage()">
    <!-- Poet Header -->
    <div style="background: white; padding: 2rem; border-radius: 0.75rem; box-shadow: var(--shadow); margin-bottom: 2rem;">
        <h1 class="telugu-text" style="color: var(--primary-color); margin-bottom: 0.5rem;" x-text="poet.name"></h1>
        <div x-show="poet.name_english" style="color: #6b7280; font-size: 1.1rem; margin-bottom: 1.5rem;">
            <span x-text="poet.name_english"></span>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem;">
            <div x-show="poet.era" style="padding: 1rem; background: #f9fafb; border-radius: 0.5rem;">
                <div style="font-size: 0.9rem; color: #6b7280; margin-bottom: 0.25rem;">Era</div>
                <div style="font-weight: 600; color: var(--primary-color);" x-text="poet.era"></div>
            </div>

            <div x-show="poet.birth_year" style="padding: 1rem; background: #f9fafb; border-radius: 0.5rem;">
                <div style="font-size: 0.9rem; color: #6b7280; margin-bottom: 0.25rem;">Birth Year</div>
                <div style="font-weight: 600; color: var(--primary-color);" x-text="poet.birth_year"></div>
            </div>

            <div x-show="poet.death_year" style="padding: 1rem; background: #f9fafb; border-radius: 0.5rem;">
                <div style="font-size: 0.9rem; color: #6b7280; margin-bottom: 0.25rem;">Death Year</div>
                <div style="font-weight: 600; color: var(--primary-color);" x-text="poet.death_year"></div>
            </div>

            <div style="padding: 1rem; background: #f9fafb; border-radius: 0.5rem;">
                <div style="font-size: 0.9rem; color: #6b7280; margin-bottom: 0.25rem;">Total Poems</div>
                <div style="font-size: 1.5rem; font-weight: 700; color: var(--primary-color);" x-text="poemCount"></div>
            </div>
        </div>

        <div x-show="poet.biography" style="margin-top: 1.5rem;">
            <h3 style="color: #374151; margin-bottom: 0.5rem;">Biography</h3>
            <p class="telugu-text" style="color: #4b5563; line-height: 1.6;" x-text="poet.biography"></p>
        </div>
    </div>

    <!-- Poems List -->
    <div style="background: white; padding: 2rem; border-radius: 0.75rem; box-shadow: var(--shadow);">
        <h2 style="color: var(--primary-color); margin-bottom: 1.5rem;">
            Poems by <span class="telugu-text" x-text="poet.name"></span> (<span x-text="poemCount"></span>)
        </h2>

        <div x-show="poems.length === 0" style="text-align: center; padding: 3rem; color: #6b7280;">
            <p>No poems found by this poet.</p>
        </div>

        <div style="display: grid; gap: 1rem;">
            <template x-for="poem in poems" :key="poem.id">
                <div style="padding: 1.5rem; background: #f9fafb; border-radius: 0.5rem; border-left: 4px solid var(--primary-color); transition: all 0.2s;"
                     @mouseenter="$el.style.boxShadow = '0 4px 6px -1px rgba(0, 0, 0, 0.1)'"
                     @mouseleave="$el.style.boxShadow = 'none'">
                    <a :href="'/poem/' + poem.id" style="text-decoration: none; color: inherit;">
                        <h3 class="telugu-text" style="color: var(--primary-color); margin-bottom: 0.75rem; font-size: 1.2rem;" x-text="poem.title"></h3>

                        <div class="telugu-text" style="color: #4b5563; line-height: 1.8; margin-bottom: 0.75rem; max-height: 4.5em; overflow: hidden; position: relative;">
                            <span x-text="poem.text.substring(0, 150)"></span>
                            <span x-show="poem.text.length > 150">...</span>
                        </div>

                        <div style="display: flex; gap: 1.5rem; flex-wrap: wrap; font-size: 0.875rem; color: #6b7280;">
                            <span x-show="poem.literary_form">
                                <strong>Form:</strong> <span x-text="poem.literary_form"></span>
                            </span>
                            <span x-show="poem.word_count">
                                <strong>Words:</strong> <span x-text="poem.word_count"></span>
                            </span>
                            <span x-show="poem.line_count">
                                <strong>Lines:</strong> <span x-text="poem.line_count"></span>
                            </span>
                            <span x-show="poem.gana_count">
                                <strong>Ganas:</strong> <span x-text="poem.gana_count"></span>
                            </span>
                        </div>
                    </a>
                </div>
            </template>
        </div>
    </div>
</div>

<script>
function poetDetailPage() {
    return {
        poet: {{ poet | tojson }},
        poems: {{ poems | tojson }},
        poemCount: {{ poem_count }},

        init() {
            console.log('Poet detail page initialized');
            console.log('Poet:', this.poet);
            console.log('Poems:', this.poems);
        }
    };
}

document.addEventListener('alpine:init', () => {
    Alpine.data('poetDetailPage', poetDetailPage);
});
</script>

<style>
[x-cloak] { display: none !important; }
</style>
{% endblock %}
